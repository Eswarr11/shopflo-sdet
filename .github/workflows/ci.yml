name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: write

env:
  API_BASE_URL: https://fakestoreapi.com
  UI_BASE_URL: https://www.saucedemo.com
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.61.1-noble

jobs:
  setup-auth:
    name: Generate auth sessions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run global setup
        run: npx ts-node scripts/run-auth-setup.ts
        env:
          CI: true
          UI_BASE_URL: ${{ env.UI_BASE_URL }}

      - name: Verify auth files
        run: |
          ls -la .auth/
          test "$(find .auth -name '*.json' | wc -l)" -ge 1

      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: .auth
          if-no-files-found: error
          retention-days: 1

  api-tests:
    name: API shard ${{ matrix.shard }}/5
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [1, 2, 3, 4, 5]
    env:
      CI: true
      WORKERS: '2'
      API_BASE_URL: ${{ env.API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test api/tests --project=api --shard=${{ matrix.shard }}/5

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-blob-report-shard-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results-shard-${{ matrix.shard }}
          path: my-allure-results
          if-no-files-found: warn
          retention-days: 1

  merge-api-reports:
    name: Merge API reports
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: api-blob-report-shard-*
          merge-multiple: true

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: combined-allure-results
          pattern: api-allure-results-shard-*
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        continue-on-error: true

      - name: Generate Allure report
        run: npx allure generate combined-allure-results --clean -o allure-report
        continue-on-error: true

      - name: Upload merged API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports-${{ github.run_number }}
          path: |
            playwright-report/
            allure-report/
          if-no-files-found: warn
          retention-days: 14

  ui-tests:
    name: UI shard ${{ matrix.shard }}/5
    needs: setup-auth
    if: ${{ needs.setup-auth.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    env:
      CI: true
      WORKERS: '2'
      UI_BASE_URL: ${{ env.UI_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: .auth

      - name: Verify auth files
        run: |
          ls -la .auth/
          test "$(find .auth -name '*.json' | wc -l)" -ge 1

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests
        run: npx playwright test ui/tests --project=ui --shard=${{ matrix.shard }}/5

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-blob-report-shard-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results-shard-${{ matrix.shard }}
          path: my-allure-results
          if-no-files-found: warn
          retention-days: 1

  merge-ui-reports:
    name: Merge UI reports
    needs: ui-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: ui-blob-report-shard-*
          merge-multiple: true

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: combined-allure-results
          pattern: ui-allure-results-shard-*
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        continue-on-error: true

      - name: Generate Allure report
        run: npx allure generate combined-allure-results --clean -o allure-report
        continue-on-error: true

      - name: Upload merged UI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-reports-${{ github.run_number }}
          path: |
            playwright-report/
            allure-report/
          if-no-files-found: warn
          retention-days: 14
