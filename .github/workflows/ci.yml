name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

env:
  API_BASE_URL: https://fakestoreapi.com
  UI_BASE_URL: https://www.saucedemo.com
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.61.1-noble
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  setup-auth:
    name: Generate auth sessions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run global setup
        run: npx ts-node scripts/run-auth-setup.ts
        env:
          CI: true

      - name: Verify auth files
        run: |
          ls -la .auth/
          test "$(find .auth -name '*.json' | wc -l)" -ge 1

      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: .auth
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  api-tests:
    name: API shard ${{ matrix.shard }}/5
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [1, 2, 3, 4, 5]
    env:
      CI: true
      WORKERS: '2'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test api/tests --project=api --shard=${{ matrix.shard }}/5

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-blob-report-shard-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results-shard-${{ matrix.shard }}
          path: my-allure-results
          if-no-files-found: warn
          retention-days: 1

  merge-api-reports:
    name: Merge API reports
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: api-blob-report-shard-*
          merge-multiple: true

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: combined-allure-results
          pattern: api-allure-results-shard-*
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        continue-on-error: true

      - name: Generate Allure report
        run: npx allure generate combined-allure-results --clean -o allure-report
        continue-on-error: true

      - name: Upload merged API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports-${{ github.run_number }}
          path: |
            playwright-report/
            allure-report/
          if-no-files-found: warn
          retention-days: 14

  ui-tests:
    name: UI shard ${{ matrix.shard }}/5
    needs: setup-auth
    if: ${{ needs.setup-auth.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    env:
      CI: true
      WORKERS: '2'
    steps:
      - uses: actions/checkout@v4

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: .auth

      - name: Verify auth files
        run: |
          ls -la .auth/
          test "$(find .auth -name '*.json' | wc -l)" -ge 1

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests
        run: npx playwright test ui/tests --project=ui --shard=${{ matrix.shard }}/5

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-blob-report-shard-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results-shard-${{ matrix.shard }}
          path: my-allure-results
          if-no-files-found: warn
          retention-days: 1

  merge-ui-reports:
    name: Merge UI reports
    needs: ui-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: ui-blob-report-shard-*
          merge-multiple: true

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: combined-allure-results
          pattern: ui-allure-results-shard-*
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        continue-on-error: true

      - name: Generate Allure report
        run: npx allure generate combined-allure-results --clean -o allure-report
        continue-on-error: true

      - name: Upload merged UI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-reports-${{ github.run_number }}
          path: |
            playwright-report/
            allure-report/
          if-no-files-found: warn
          retention-days: 14

  deploy-pages:
    name: Deploy reports to GitHub Pages
    needs: [merge-api-reports, merge-ui-reports]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download API reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: api-reports-${{ github.run_number }}
          path: downloaded/api

      - name: Download UI reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ui-reports-${{ github.run_number }}
          path: downloaded/ui

      - name: Prepare GitHub Pages
        run: |
          mkdir -p gh-pages/api/playwright gh-pages/api/allure gh-pages/ui/playwright gh-pages/ui/allure

          if [ -d downloaded/api/playwright-report ]; then
            cp -r downloaded/api/playwright-report/. gh-pages/api/playwright/
          fi
          if [ -d downloaded/api/allure-report ]; then
            cp -r downloaded/api/allure-report/. gh-pages/api/allure/
          fi
          if [ -d downloaded/ui/playwright-report ]; then
            cp -r downloaded/ui/playwright-report/. gh-pages/ui/playwright/
          fi
          if [ -d downloaded/ui/allure-report ]; then
            cp -r downloaded/ui/allure-report/. gh-pages/ui/allure/
          fi

          cat > gh-pages/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>SDET Test Reports</title>
            <style>
              body { font-family: sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
              h1 { margin-bottom: 8px; }
              h2 { margin-top: 32px; color: #333; }
              a { display: block; margin: 8px 0; font-size: 16px; }
            </style>
          </head>
          <body>
            <h1>SDET Test Reports</h1>
            <p>Run #${GITHUB_RUN_NUMBER} &mdash; ${GITHUB_SHA}</p>
            <h2>API (FakeStoreAPI)</h2>
            <a href="api/playwright/">Playwright HTML Report</a>
            <a href="api/allure/">Allure Report</a>
            <h2>UI (SauceDemo)</h2>
            <a href="ui/playwright/">Playwright HTML Report</a>
            <a href="ui/allure/">Allure Report</a>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
